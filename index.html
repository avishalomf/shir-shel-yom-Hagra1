<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v1.4.9 - שיר של יום</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hebcal@1.6.0/dist/hebcal.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; max-width: 700px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #psalm-label { color: #d9534f; font-size: 1.1em; font-weight: 500; margin-bottom: 10px; }
        #psalm-title { color: #2c3e50; font-size: 2.2em; margin: 0 0 20px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #psalm-content { white-space: pre-wrap; font-size: 1.4em; text-align: right; line-height: 1.8; color: #34495e; }
        .v-footer { margin-top: 30px; color: #bdc3c7; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div id="psalm-label"></div>
    <h1 id="psalm-title">טוען...</h1>
    <div id="psalm-content"></div>
    <div class="v-footer">גרסה 1.4.9 | פותח עבור יהודה</div>
</div>

<script>
    // VERSION: 1.4.9
    let cachedData = null;

    function numToHeb(num) {
        const letters = {
            1:'א', 2:'ב', 3:'ג', 4:'ד', 5:'ה', 6:'ו', 7:'ז', 8:'ח', 9:'ט',
            10:'י', 12:'י"ב', 18:'י"ח', 22:'כ"ב', 24:'כ"ד', 29:'כ"ט', 48:'מ"ח', 50:'נ',
            66:'ס"ו', 76:'ע"ו', 78:'ע"ח', 80:'פ', 81:'פ"א', 82:'פ"ב', 92:'צ"ב', 
            93:'צ"ג', 94:'צ"ד', 104:'ק"ד', 105:'ק"ה', 114:'קי"ד', 135:'קל"ה'
        };
        return letters[num] || num;
    }

    function getFinalKey(date) {
        // בדיקה רב-שכבתית לאיתור הספרייה
        const hClass = (window.Hebcal && window.Hebcal.HDate) || (window.hebcal && window.hebcal.HDate);
        
        if (!hClass) {
            return { error: true, msg: "שגיאת טעינה: אנא רענן את הדף (F5)" };
        }

        const hd = new hClass(date);
        const d = hd.getDate();
        const m = hd.getMonth();
        const dw = date.getDay();

        if (dw === 6) return { key: "92", label: "שבת קודש" };

        // לוגיקה סוכות (תשרי = 7)
        if (m === 7 && d >= 15 && d <= 21) {
            if (d === 15) return { key: "76", label: "יום א' דסוכות" };
            const idx = d - 15;
            const l = (d === 21) ? "הושענא רבא" : numToHeb(idx) + " דחוה\"מ סוכות";
            if (idx === 1) return { key: "29", label: l };
            if (idx === 2) return { key: "50", label: l };
            if (idx === 3) return { key: (dw === 0) ? "50" : "94_B", label: l };
            if (idx === 4) return { key: (dw === 1) ? "94_B" : "94_A", label: l };
            if (idx === 5) return { key: (dw === 0 || dw === 2) ? "94_A" : "81", label: l };
            return { key: "82", label: l };
        }

        // לוגיקה פסח (ניסן = 1)
        if (m === 1 && d >= 15 && d <= 21) {
            if (d === 15) return { key: "114", label: "יום א' דפסח" };
            if (d === 21) return { key: "18", label: "שביעי של פסח" };
            const idx = d - 15;
            const l = numToHeb(idx) + " דחוה\"מ פסח";
            if (idx === 1) return { key: (dw === 0) ? "114" : "78", label: l };
            if (idx === 2) return { key: (dw === 1) ? "78" : "80", label: l };
            if (idx === 3) return { key: (dw === 0 || dw === 2) ? "80" : "105", label: l };
            if (idx === 4) return { key: (dw === 1 || dw === 3) ? "105" : "135", label: l };
            if (idx === 5) {
                if (dw === 0 || dw === 4) return { key: "135", label: l };
                if (dw === 1) return { key: "105", label: l };
                return { key: "66", label: l };
            }
        }

        if (d === 1 || d === 30) return { key: "104", label: "ראש חודש" };
        if (dw === 3) return { key: "94", label: "" };
        
        const map = {0:'24', 1:'48', 2:'82', 4:'81', 5:'93'};
        return { key: map[dw] || "24", label: "" };
    }

    async function run() {
        try {
            const res = getFinalKey(new Date());
            if (res.error) {
                document.getElementById('psalm-title').innerText = res.msg;
                return;
            }

            const response = await fetch('psalms.json');
            cachedData = await response.json();
            
            let txt = "";
            let base = res.key.split('_')[0];
            let title = "מזמור " + numToHeb(base);

            if (res.key === "94") {
                const a = Object.values(cachedData["94_A"] || {}).join(' ');
                const b = Object.values(cachedData["94_B"] || {}).join(' ');
                txt = a + "\n\n" + b;
            } else {
                const d = cachedData[res.key];
                txt = (typeof d === 'object' ? Object.values(d).join(' ') : d) || "לא נמצא";
                if (res.key === "94_A") title += " (א'-ט\"ו)";
                if (res.key === "94_B") title += " (ט\"ז-כ\"ג)";
            }

            document.getElementById('psalm-title').innerText = title;
            document.getElementById('psalm-label').innerText = res.label;
            document.getElementById('psalm-content').innerText = txt.trim();

        } catch (e) {
            document.getElementById('psalm-title').innerText = "שגיאת קובץ נתונים";
            console.error(e);
        }
    }

    window.onload = run;
</script>

</body>
</html>
