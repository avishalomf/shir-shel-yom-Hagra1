<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>שיר של יום - גרסה מקוונת</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #e74c3c; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; direction: rtl; color: var(--text); }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: 20px auto; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .moed { background: var(--secondary); color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 10px 0; font-weight: bold; }
        #content { font-size: 1.5rem; line-height: 1.8; white-space: pre-wrap; margin-top: 20px; text-align: justify; }
        .offline-badge { font-size: 0.7rem; color: #95a5a6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button onclick="changeDate(1)">→ יום קודם</button>
            <div id="date-display">טוען...</div>
            <button onclick="changeDate(-1)">יום הבא ←</button>
        </div>
        <div id="moed-tag"></div>
        <h2 id="title"></h2>
        <div id="content"></div>
        <div class="offline-badge">גרסה 5.0 - עבודה ללא רשת מוטמעת</div>
    </div>

<script>
    // מאגר מזמורים בסיסי מוטמע (דוגמה - יש להשלים את השאר באותו פורמט)
    const psalms = {
        "24": "לְדָוִד מִזְמוֹר לַיהוָה הָאָרֶץ וּמְלוֹאָהּ...",
        "48": "שִׁיר מִזְמוֹר לִבְנֵי קֹרַח גָּדוֹל יְהוָה וּמְהֻלָּל מְאֹד...",
        "82": "מִזְמוֹר לְאָסָף אֱלֹהִים נִצָּב בַּעֲדַת אֵל...",
        "94": "אֵל נְקָמוֹת יְהוָה אֵל נְקָמוֹת הוֹפִיעַ...",
        "81": "לַמְנַצֵּחַ עַל הַגִּתִּית לְאָסָף הַרְנִינוּ לֵאלֹהִים עוּזֵּנוּ...",
        "93": "יְהוָה מָלָךְ גֵּאוּת לָבֵשׁ...",
        "92": "מִזְמוֹר שִׁיר לְיוֹם הַשַּׁבָּת טוֹב לְהֹדוֹת לַיהוָה...",
        "114": "בְּצֵאת יִשְׂרָאֵל מִמִּצְרָיִם בֵּית יַעֲקֹב מֵעַם לֹעֵז...",
        "18": "לַמְנַצֵּחַ לְעֶבֶד יְהוָה לְדָוִד אֲשֶׁר דִּבֶּר לַיהוָה אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת..."
    };

    let viewDate = new Date();

    function update() {
        const day = viewDate.getDay();
        const days = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
        document.getElementById('date-display').innerText = "יום " + days[day] + "\n" + viewDate.toLocaleDateString('he-IL');

        let key = "";
        let label = "";

        // לוגיקה פשוטה לימי חול ושבת (Offline)
        const weekly = {0:"24", 1:"48", 2:"82", 3:"94", 4:"81", 5:"93", 6:"92"};
        key = weekly[day];

        // הצגת הנתונים
        document.getElementById('title').innerText = "מזמור " + (key === "92" ? "שבת" : key);
        document.getElementById('content').innerText = psalms[key] || "המזמור יוטמע בסינכרון הבא";
    }

    function changeDate(d) {
        viewDate.setDate(viewDate.getDate() - d);
        update();
    }

    update();
</script>
</body>
</html>
