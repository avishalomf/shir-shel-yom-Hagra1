<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="./app.webmanifest">
    
    <title>שיר של יום - מנהג הגר"א</title>
    <script src="https://cdn.jsdelivr.net/npm/@hebcal/core@latest/dist/bundle.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #e74c3c; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; color: var(--text); -webkit-tap-highlight-color: transparent; }
        #app-root { display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 92%; margin: 20px auto; text-align: center; }
        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; flex: 1; font-size: 1rem; }
        .date-picker-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        #date-input { border: 1px solid #ccc; padding: 10px; border-radius: 10px; font-family: inherit; font-size: 1rem; width: 80%; cursor: pointer; text-align: center; }
        #hebrew-date { font-size: 1.3rem; font-weight: bold; color: var(--primary); line-height: 1.4; margin: 10px 0; }
        .moed-label { background: var(--secondary); color: white; padding: 6px 25px; border-radius: 25px; font-size: 1rem; font-weight: bold; margin: 15px 0; display: inline-block; }
        #psalm-title { color: var(--primary); border-bottom: 3px solid var(--secondary); padding-bottom: 8px; margin: 15px 0; font-size: 1.8rem; }
        #psalm-content { font-size: 1.6rem; line-height: 1.8; text-align: justify; white-space: pre-wrap; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .footer-info { margin-top: auto; font-size: 0.75rem; color: #b2bec3; padding: 20px; text-align: center; width: 100%; }
    </style>
</head>
<body>
<div id="app-root">
    <div class="container">
        <div class="date-picker-section">
            <input type="date" id="date-input" onchange="pickDate(this.value)">
        </div>
        <div class="nav-controls">
            <button class="nav-btn" onclick="changeDate(1)">→ יום קודם</button>
            <button class="nav-btn" onclick="changeDate(-1)">יום הבא ←</button>
        </div>
        <div id="hebrew-date">טוען...</div>
        <div id="moed-container"></div>
        <h1 id="psalm-title">---</h1>
        <div id="psalm-content">טוען...</div>
    </div>
    <div class="footer-info">גרסה 1.1.0 | מנהג הגר"א</div>
</div>

<script>
    let currentDate = new Date();
    let psalmsCache = null;

    // רישום Service Worker עבור PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.error('Service Worker Failed', err));
        });
    }

    // פונקציה להמרת מספר לגימטריה
    function numToHeb(n) {
        if (typeof n === 'string' && n.includes('_')) return 'צ"ד';
        n = parseInt(n); if (isNaN(n)) return n;
        const units = ['', 'א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט'], 
              tens = ['', 'י', 'כ', 'ל', 'מ', 'נ', 'ס', 'ע', 'פ', 'צ'], 
              hundreds = ['', 'ק', 'ר', 'ש', 'ת'];
        let res = ""; if (n >= 5000) n %= 1000;
        while (n >= 400) { res += "ת"; n -= 400; }
        if (n >= 100) { res += hundreds[Math.floor(n/100)]; n %= 100; }
        if (n === 15) res += "טו"; else if (n === 16) res += "טז";
        else { res += tens[Math.floor(n / 10)]; res += units[n % 10]; }
        return res.length > 1 ? res.slice(0, -1) + '"' + res.slice(-1) : res + "'";
    }

    // קביעת המפתח של המזמור לפי התאריך
    function determinePsalmKey(date) {
        const hDate = new hebcal.HDate(date);
        const day = hDate.getDate();
        const month = hDate.getMonth(); 
        const dayOfWeek = date.getDay();

        if (day === 1 || day === 30) return { key: "104", label: "ראש חודש" };
        if (dayOfWeek === 6) return { key: "92", label: "שבת קודש" };

        if (month === 1) { // ניסן
            if (day === 15) return { key: "114", label: "יום א' דפסח" };
            if (day === 21) return { key: "18", label: "שביעי של פסח" };
            if (day > 15 && day < 21) {
                let count = 0;
                for (let d = 16; d <= day; d++) {
                    if (new hebcal.HDate(d, 1, hDate.getFullYear()).greg().getDay() !== 6) count++;
                }
                const p = ["78", "80", "105", "135", "66"];
                return { key: p[count-1], label: numToHeb(count) + " דחוה\"מ פסח" };
            }
        }
        if (month === 7) { // תשרי
            if (day === 15) return { key: "76", label: "יום א' דסוכות" };
            if (day === 22) return { key: "12", label: "שמיני עצרת" };
            if (day > 15 && day < 22) {
                let count = 0;
                for (let d = 16; d <= day; d++) {
                    if (new hebcal.HDate(d, 7, hDate.getFullYear()).greg().getDay() !== 6) count++;
                }
                const s = ["29", "50", "94_A", "94_B", "81", "82"];
                return { key: s[count-1], label: (day===21)?"הושענא רבא":numToHeb(count)+" דחוה\"מ סוכות" };
            }
        }
        return { key: {0:'24', 1:'48', 2:'82', 3:'94_B', 4:'81', 5:'93'}[dayOfWeek], label: "" };
    }

    // טעינת התוכן והצגתו
    async function loadPsalm() {
        try {
            const hDate = new hebcal.HDate(currentDate);
            const daysArr = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
            const monthsHe = ["","ניסן","אייר","סיון","תמוז","אב","אלול","תשרי","חשון","כסלו","טבת","שבט","אדר","אדר ב'"];
            const monthName = monthsHe[hDate.getMonth()];

            document.getElementById('hebrew-date').innerHTML = "יום " + daysArr[currentDate.getDay()] + ", " + numToHeb(hDate.getDate()) + " ב" + monthName + " " + numToHeb(hDate.getFullYear());
            document.getElementById('date-input').value = currentDate.toISOString().split('T')[0];
            
            const info = determinePsalmKey(currentDate);
            document.getElementById('moed-container').innerHTML = info.label ? `<div class="moed-label">${info.label}</div>` : "";
            
            if (!psalmsCache) {
                const resp = await fetch('psalms.json');
                psalmsCache = await resp.json();
            }
            
            let data = psalmsCache[info.key];
            if (data) {
                let baseNum = info.key.split('_')[0];
                let titleText = "מזמור " + numToHeb(baseNum);
                
                // הוספת טווחי פסוקים לכותרת במידה ומדובר בחלק א' או ב'
                if (info.key === "94_A") {
                    titleText += ", א'-ט\"ו";
                } else if (info.key === "94_B" && info.label.includes("סוכות")) {
                    titleText += ", ט\"ז-כ\"ג";
                }

                document.getElementById('psalm-title').innerText = titleText;
                document.getElementById('psalm-content').innerText = (typeof data === 'object' ? Object.values(data).join(' ') : data).trim();
            }
        } catch (e) { 
            console.error(e);
            document.getElementById('psalm-content').innerText = "שגיאה בטעינת הקבצים. וודא ש-psalms.json קיים.";
        }
    }

    function changeDate(d) { currentDate.setDate(currentDate.getDate() - d); loadPsalm(); }
    function pickDate(val) { if (val) { currentDate = new Date(val); loadPsalm(); } }
    
    // אתחול האפליקציה לאחר טעינת ספריית Hebcal
    window.onload = () => { 
        let attempts = 0;
        let c = setInterval(() => { 
            if (typeof hebcal !== 'undefined') { 
                clearInterval(c); 
                loadPsalm(); 
            } else if (attempts > 50) {
                clearInterval(c);
            }
            attempts++;
        }, 100); 
    };
</script>
</body>
</html>
