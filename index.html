<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיר של יום - גרסת שחזור</title>
    <script src="https://cdn.jsdelivr.net/npm/@hebcal/core@latest/dist/bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; direction: rtl; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav { display: flex; justify-content: space-between; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 8px; }
        #psalm-content { font-size: 1.4rem; line-height: 1.8; white-space: pre-wrap; text-align: justify; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button onclick="changeDate(1)">→ קודם</button>
            <div id="h-date">טוען...</div>
            <button onclick="changeDate(-1)">הבא ←</button>
        </div>
        <h2 id="p-title"></h2>
        <div id="p-content">טוען מזמור...</div>
    </div>

<script>
    let curr = new Date();
    let cache = null;

    // גימטריה פשוטה ללא סיכון לשכפול
    function toHeb(n) {
        if (n === "94_A") return 'צ"ד (א)';
        let num = parseInt(n);
        const units = ['', 'א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט'];
        const tens = ['', 'י', 'כ', 'ל', 'מ', 'נ', 'ס', 'ע', 'פ', 'צ'];
        let res = "";
        if (num > 100) { res += "ק"; num -= 100; } // טיפול בסיסי למזמורים עד 150
        if (num === 15) return res + "טו";
        if (num === 16) return res + "טז";
        res += tens[Math.floor(num / 10)] + units[num % 10];
        return res.length > 1 ? res.slice(0, -1) + '"' + res.slice(-1) : res + "'";
    }

    async function load() {
        const hDate = new hebcal.HDate(curr);
        document.getElementById('h-date').innerText = hDate.render('he');
        
        const dow = curr.getDay();
        const keys = {0:'24', 1:'48', 2:'82', 3:'94_A', 4:'81', 5:'93', 6:'92'};
        const key = keys[dow];

        if (!cache) cache = await (await fetch('./psalms.json')).json();
        
        document.getElementById('p-title').innerText = "מזמור " + toHeb(key);
        document.getElementById('p-content').innerText = cache[key] || "מזמור לא נמצא";
    }

    function changeDate(d) { curr.setDate(curr.getDate() - d); load(); }
    window.onload = () => { setTimeout(load, 500); };
</script>
</body>
</html>
