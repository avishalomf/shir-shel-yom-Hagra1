<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>v1.4.8 - שיר של יום</title>
    <script src="https://unpkg.com/hebcal@1.6.0/dist/hebcal.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        #psalm-content { white-space: pre-wrap; font-size: 1.3em; text-align: justify; line-height: 1.8; margin-top: 20px; }
        .version { color: #aaa; font-size: 0.7em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="psalm-label" style="color: #666; font-weight: bold;"></div>
        <h1 id="psalm-title">טוען...</h1>
        <div id="psalm-content"></div>
        <div id="version-tag" class="version">v1.4.8</div>
    </div>

    <script>
        // VERSION: 1.4.8
        let psalmsData = null;

        function numToHeb(num) {
            const letters = {
                1:'א', 2:'ב', 3:'ג', 4:'ד', 5:'ה', 6:'ו', 7:'ז', 8:'ח', 9:'ט',
                10:'י', 12:'י"ב', 18:'י"ח', 22:'כ"ב', 24:'כ"ד', 29:'כ"ט', 48:'מ"ח', 50:'נ',
                66:'ס"ו', 76:'ע"ו', 78:'ע"ח', 80:'פ', 81:'פ"א', 82:'פ"ב', 92:'צ"ב', 
                93:'צ"ג', 94:'צ"ד', 104:'ק"ד', 105:'ק"ה', 114:'קי"ד', 135:'קל"ה'
            };
            return letters[num] || num;
        }

        function getPsalmKey(date) {
            // בדיקה אם הספריה נטענה
            const HDateClass = (typeof Hebcal !== 'undefined') ? Hebcal.HDate : (typeof hebcal !== 'undefined' ? hebcal.HDate : null);
            if (!HDateClass) return { key: "ERROR", label: "ספריית Hebcal לא נטענה" };

            const hDate = new HDateClass(date);
            const day = hDate.getDate();
            const month = hDate.getMonth();
            const dayOfWeek = date.getDay();

            if (dayOfWeek === 6) return { key: "92", label: "שבת קודש" };

            // לוגיקה סוכות (לפי הטבלה שלך)
            if (month === 7 && day >= 15 && day <= 21) {
                if (day === 15) return { key: "76", label: "יום א' דסוכות" };
                const mIndex = day - 15;
                const lbl = (day === 21) ? "הושענא רבא" : numToHeb(mIndex) + " דחוה\"מ סוכות";
                if (mIndex === 1) return { key: "29", label: lbl };
                if (mIndex === 2) return { key: "50", label: lbl };
                if (mIndex === 3) return { key: (dayOfWeek === 0) ? "50" : "94_B", label: lbl };
                if (mIndex === 4) return { key: (dayOfWeek === 1) ? "94_B" : "94_A", label: lbl };
                if (mIndex === 5) return { key: (dayOfWeek === 0 || dayOfWeek === 2) ? "94_A" : "81", label: lbl };
                return { key: "82", label: lbl };
            }

            // לוגיקה פסח (לפי הטבלה שלך)
            if (month === 1 && day >= 15 && day <= 21) {
                if (day === 15) return { key: "114", label: "יום א' דפסח" };
                if (day === 21) return { key: "18", label: "שביעי של פסח" };
                const mIndex = day - 15;
                const lbl = numToHeb(mIndex) + " דחוה\"מ פסח";
                if (mIndex === 1) return { key: (dayOfWeek === 0) ? "114" : "78", label: lbl };
                if (mIndex === 2) return { key: (dayOfWeek === 1) ? "78" : "80", label: lbl };
                if (mIndex === 3) return { key: (dayOfWeek === 0 || dayOfWeek === 2) ? "80" : "105", label: lbl };
                if (mIndex === 4) return { key: (dayOfWeek === 1 || dayOfWeek === 3) ? "105" : "135", label: lbl };
                if (mIndex === 5) {
                    if (dayOfWeek === 0 || dayOfWeek === 4) return { key: "135", label: lbl };
                    if (dayOfWeek === 1) return { key: "105", label: lbl };
                    return { key: "66", label: lbl };
                }
            }

            if (day === 1 || day === 30) return { key: "104", label: "ראש חודש" };
            if (dayOfWeek === 3) return { key: "94", label: "" };
            return { key: {0:'24', 1:'48', 2:'82', 4:'81', 5:'93'}[dayOfWeek] || "24", label: "" };
        }

        async function load() {
            try {
                const info = getPsalmKey(new Date());
                if (info.key === "ERROR") {
                    document.getElementById('psalm-title').innerText = info.label;
                    return;
                }

                const resp = await fetch('psalms.json');
                psalmsData = await resp.json();
                
                let content = "";
                let title = "מזמור " + numToHeb(info.key.split('_')[0]);

                if (info.key === "94") {
                    const a = Object.values(psalmsData["94_A"] || {}).join(' ');
                    const b = Object.values(psalmsData["94_B"] || {}).join(' ');
                    content = a + "\n\n" + b;
                } else {
                    const d = psalmsData[info.key];
                    content = (typeof d === 'object' ? Object.values(d).join(' ') : d) || "המזמור לא נמצא בבסיס הנתונים";
                    if (info.key === "94_A") title += " (א'-ט\"ו)";
                    if (info.key === "94_B") title += " (ט\"ז-כ\"ג)";
                }

                document.getElementById('psalm-title').innerText = title;
                document.getElementById('psalm-label').innerText = info.label;
                document.getElementById('psalm-content').innerText = content;

            } catch (err) {
                document.getElementById('psalm-title').innerText = "שגיאה בטעינת הקבצים";
                console.error(err);
            }
        }

        window.onload = load;
    </script>
</body>
</html>
